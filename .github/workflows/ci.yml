name: Toon Castle CI

on:
  push:
    branches: [ main, develop, feature/** ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Stable version to Vite 7
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit Security
        run: npm audit --audit-level=critical 

      - name: Valid lint for quality
        run: npm run lint

      - name: Type Check
        run: npm run type-check

      - name: Test quality
        run: npm run test:cov

      - name: Generate build
        run: npm run build