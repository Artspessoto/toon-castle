name: Toon Castle CI

on:
  push:
    branches: [ main, feature/** ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Stable version to Vite 7
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Audit Security
        run: npm audit --audit-level=high 

      - name: Valid lint for quality
        run: npm run lint

      - name: Type Check
        run: npm run type-check

      - name: Generate build
        run: npm run build